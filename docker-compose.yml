services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_PUBLIC_HOSTNAME}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_SECURE_COOKIE: "true"
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Etc/UTC}
      TZ: ${GENERIC_TIMEZONE:-Etc/UTC}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"
      WEBHOOK_URL: https://${N8N_PUBLIC_HOSTNAME}/
      N8N_EDITOR_BASE_URL: https://${N8N_PUBLIC_HOSTNAME}/
    volumes:
      - ./docker-data/n8n:/home/node/.n8n

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run --url http://n8n:5678
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN} # You'll need to create this token
      # Consider adding a custom Cloudflare Tunnel config.yml here for more advanced setups
    depends_on:
      - n8n